version: "3.9"

services:
  backend:
    build: ./Backend
    container_name: talentpilot_backend
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/talentmatch_ai

  frontend:
    build: ./Frontend
    container_name: talentpilot_frontend
    ports:
      - "8501:8501"
    volumes:
      - ./Frontend:/app
    command: streamlit run app.py --server.address=0.0.0.0
    depends_on:
      - backend

  db:
    image: postgres:16
    container_name: talentpilot_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: talentmatch_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: